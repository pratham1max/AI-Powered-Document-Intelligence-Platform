version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - encrypted_files:/app/encrypted_files
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app worker -Q default -c 4 --loglevel=info
    env_file: .env
    volumes:
      - encrypted_files:/app/encrypted_files
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  crypto-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app worker -Q crypto -c 2 --loglevel=info
    env_file: .env
    volumes:
      - encrypted_files:/app/encrypted_files
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    networks:
      - internal
    depends_on:
      - redis

  react-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - internal
    depends_on:
      - fastapi-app

volumes:
  postgres_data:
  encrypted_files:

networks:
  internal:
    driver: bridge
